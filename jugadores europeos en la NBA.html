body { background:#0d1117; font-family:"Segoe UI",Arial,sans-serif; color:white; }
h1 {
  text-align:center; font-size:2em; padding:15px 0 4px;
  background:linear-gradient(90deg,#ff6b00,#fff,#ff6b00);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  letter-spacing:3px;
}
h2.sub { text-align:center; color:#888; font-size:0.85em; margin-bottom:6px; }
p.tip { text-align:center; color:#555; font-size:0.78em; margin-bottom:8px; }

#map { width:100%; height:72vh; min-height:480px; background:#0d1117; }

/* Leaflet overrides */
.leaflet-container { background:#0d1117 !important; }
.leaflet-tile-pane { display:none; }

/* Tooltip */
.nba-popup .leaflet-popup-content-wrapper {
  background:rgba(10,15,25,0.97);
  border:2px solid #ff6b00;
  border-radius:14px;
  color:white;
  box-shadow:0 8px 32px rgba(0,0,0,0.8);
  min-width:260px;
  max-width:320px;
}
.nba-popup .leaflet-popup-tip { background:#ff6b00; }
.nba-popup .leaflet-popup-content { margin:14px 16px; }

.popup-title {
  font-size:1.1em; font-weight:700; color:#ff6b00;
  margin-bottom:10px; display:flex; align-items:center; gap:6px;
}
.player-card {
  display:flex; align-items:center; gap:10px;
  background:rgba(255,255,255,0.06);
  border-radius:8px; padding:7px 10px; margin-bottom:6px;
}
.player-card img {
  width:52px; height:52px; border-radius:50%;
  object-fit:cover; object-position:top;
  border:2.5px solid var(--tc);
  flex-shrink:0;
}
.player-info { display:flex; flex-direction:column; flex:1; }
.player-name { font-size:0.88em; font-weight:700; color:#fff; }
.player-team { font-size:0.73em; margin-top:2px; }
.team-pill {
  font-size:0.7em; font-weight:800; border-radius:5px;
  padding:3px 7px; margin-left:auto; flex-shrink:0;
  border:1px solid;
}

/* Legend */
#legend {
  display:flex; flex-wrap:wrap; justify-content:center;
  gap:7px; padding:12px 16px 18px; max-width:1200px; margin:0 auto;
}
.leg-item {
  background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12);
  border-radius:20px; padding:4px 11px; font-size:0.76em;
  cursor:pointer; transition:all 0.2s; display:flex; align-items:center; gap:5px;
}
.leg-item:hover { background:rgba(255,107,0,0.25); border-color:#ff6b00; }
.leg-dot { width:9px; height:9px; border-radius:50%; display:inline-block; }

// ── MAPA ──────────────────────────────────────────────────────
const map = L.map("map", {
  center:[52,15], zoom:4, zoomControl:true,
  attributionControl:false, minZoom:3, maxZoom:7
});

// Fondo oscuro con CartoDB dark matter
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png",{
  attribution:"", subdomains:"abcd", maxZoom:19
}).addTo(map);

// ── GeoJSON de países europeos desde CDN confiable ────────────
fetch("https://raw.githubusercontent.com/leakyMirror/map-of-europe/master/GeoJSON/europe.geojson")
  .then(r=>r.json())
  .then(data => buildMap(data))
  .catch(()=>{
    // Fallback: markers simples si GeoJSON falla
    buildMarkers();
  });

function playerHTML(p){
  const id = NBA_IDS[p.name];
  const img = id
    ? `https://cdn.nba.com/headshots/nba/latest/1040x760/${id}.png`
    : `https://via.placeholder.com/52x52/333/fff?text=NBA`;
  const tc = TEAMS[p.team]||"#888";
  const ab = ABBR[p.team]||"NBA";
  return `
  <div class="player-card">
    <img src="${img}" style="--tc:${tc}; border-color:${tc}"
         onerror="this.src='https://via.placeholder.com/52x52/222/888?text=NBA'">
    <div class="player-info">
      <span class="player-name">${p.name}</span>
      <span class="player-team" style="color:${tc}">● ${p.team}</span>
    </div>
    <span class="team-pill" style="color:${tc};border-color:${tc}40;background:${tc}18">${ab}</span>
  </div>`;
}

function popupHTML(country, data){
  let h = `<div class="popup-title">${data.flag} ${country} <span style="color:#888;font-size:0.75em;font-weight:400">(${data.players.length} jugador${data.players.length>1?"es":""})</span></div>`;
  data.players.forEach(p=>{ h += playerHTML(p); });
  return h;
}

const NAME_MAP = {
  "Spain":"Spain","France":"France","Germany":"Germany",
  "Serbia":"Serbia","Greece":"Greece","Slovenia":"Slovenia",
  "Latvia":"Latvia","Lithuania":"Lithuania","Croatia":"Croatia",
  "Finland":"Finland","Turkey":"Turkey","United Kingdom":"United Kingdom",
  "Italy":"Italy","Switzerland":"Switzerland","Ukraine":"Ukraine",
  "Austria":"Austria","Bosnia and Herzegovina":"Bosnia and Herzegovina",
  "Montenegro":"Montenegro","Portugal":"Portugal","Belgium":"Belgium",
  "Sweden":"Sweden","Georgia":"Georgia","Netherlands":"Netherlands",
  "Poland":"Poland","Israel":"Israel","Czech Republic":"Czech Republic",
  "Czechia":"Czech Republic","Czech Rep.":"Czech Republic",
  "Bosnia and Herz.":"Bosnia and Herzegovina",
  "UK":"United Kingdom","Great Britain":"United Kingdom"
};

function buildMap(geojson){
  L.geoJSON(geojson, {
    style(feature){
      const n = NAME_MAP[feature.properties.NAME||feature.properties.name||feature.properties.ADMIN] || "";
      const d = PLAYERS[n];
      return {
        fillColor: d ? d.color : "#1e2a3a",
        fillOpacity: d ? 0.75 : 0.3,
        color: d ? "#ff6b00" : "#2a3a4a",
        weight: d ? 1.5 : 0.5
      };
    },
    onEachFeature(feature, layer){
      const raw = feature.properties.NAME||feature.properties.name||feature.properties.ADMIN||"";
      const n = NAME_MAP[raw] || raw;
      const d = PLAYERS[n];
      if(!d) return;

      layer.bindTooltip(`${d.flag} <strong>${n}</strong>`, {sticky:true, className:"", direction:"top"});
      layer.bindPopup(popupHTML(n,d), {
        className:"nba-popup", maxWidth:340, minWidth:260
      });
      layer.on("mouseover", function(){ this.setStyle({fillOpacity:0.95, weight:2.5}); });
      layer.on("mouseout",  function(){ this.setStyle({fillOpacity:0.75, weight:1.5}); });
    }
  }).addTo(map);
}

function buildMarkers(){
  // Fallback: círculos con marcadores
  Object.entries(PLAYERS).forEach(([country,data])=>{
    const circle = L.circleMarker([data.lat,data.lon],{
      radius:10+data.players.length*3,
      fillColor:data.color, color:"#ff6b00",
      weight:2, fillOpacity:0.85
    }).addTo(map);
    circle.bindPopup(popupHTML(country,data),{className:"nba-popup",maxWidth:340});
    circle.bindTooltip(`${data.flag} ${country} (${data.players.length})`,{sticky:true});
  });
}

// ── LEYENDA ───────────────────────────────────────────────────
const leg = document.getElementById("legend");
Object.entries(PLAYERS)
  .sort((a,b)=>b[1].players.length-a[1].players.length)
  .forEach(([country,data])=>{
    const el = document.createElement("div");
    el.className="leg-item";
    el.innerHTML=`<span class="leg-dot" style="background:${data.color}"></span>${data.flag} ${country} <strong style="color:#ff6b00;margin-left:3px">${data.players.length}</strong>`;
    el.title=data.players.map(p=>p.name).join(", ");
    el.onclick=()=>map.flyTo([data.lat,data.lon],5,{duration:1});
    leg.appendChild(el);
  });
</script>
